<!doctype html>
<html>

<head>
    <title>Blocky Tower</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <style type="text/css" media="all">
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            position: fixed;
            inset: 0;
            z-index: 1;
        }
    </style>
</head>

<body>
    <canvas id="game-canvas"></canvas>
    <div id="toolbar">
        <button class="tool active" data-category="brush" data-action="place">Place</button>

        <button class="tool active" data-category="autotile" data-action="autotile">Autotile</button>

        <button class="tool active" data-category="tool" data-action="brush">Brush</button>
        <button class="tool" data-category="tool" data-action="rectangle">Rectangle</button>
        <button class="tool" data-category="tool" data-action="line">Line</button>
        <button class="tool" data-category="tool" data-action="fill">Fill</button>

        <button class="tool" data-category="none" data-action="rotate">Rotate</button>
        <button class="tool" data-category="none" data-action="undo">Undo</button>
        <button class="tool" data-category="none" data-action="redo">Redo</button>
        <button class="tool" data-category="none" data-action="save">Save</button>
        <button class="tool" data-category="none" data-action="load">Load</button>
        <button class="tool" data-category="none" data-action="clear-tilemap">Clear Tilemap</button>
    </div>

    <div id="tile-panel"></div>
    <script type="module" src="./assets/js/main.js"></script>
    <script type="module" src="./assets/js/editor/editor_tools.js"></script>
    <script type="module" src="./assets/js/editor/editor_tiles.js"></script>
</body>

</html>
